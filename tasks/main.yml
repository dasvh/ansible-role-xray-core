- name: Install functional dependencies
  ansible.builtin.apt:
    name: "{{ xray_system_dependencies }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Create xray system group
  ansible.builtin.group:
    name: xray
    system: yes

- name: Create xray system user
  ansible.builtin.user:
    name: xray
    group: xray
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Ensure Xray directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: xray
    group: xray
    mode: "0750"
  loop:
    - "{{ xray_install_dir }}"
    - "{{ xray_config_dir }}"
    - "{{ xray_config_dir }}/clients"
    - "{{ xray_client_output_dir }}"

- name: Download Xray release archive
  ansible.builtin.get_url:
    url: "https://github.com/XTLS/Xray-core/releases/download/{{ xray_version }}/Xray-linux-64.zip"
    dest: "/tmp/Xray-linux-64-{{ xray_version }}.zip"
    mode: "0644"

- name: Unpack Xray release
  ansible.builtin.unarchive:
    src: "/tmp/Xray-linux-64-{{ xray_version }}.zip"
    dest: "{{ xray_install_dir }}"
    remote_src: true

- name: Install Xray binary
  ansible.builtin.copy:
    src: "{{ xray_install_dir }}/xray"
    dest: "{{ xray_bin_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart Xray

- name: Check REALITY key file state
  ansible.builtin.stat:
    path: "{{ xray_config_dir }}/reality_keys.txt"
  register: xray_reality_key_file

- name: Generate REALITY private and public keys
  ansible.builtin.shell: |
    {{ xray_bin_path }} x25519 > {{ xray_config_dir }}/reality_keys.txt
    chown xray:xray {{ xray_config_dir }}/reality_keys.txt
    chmod 400 {{ xray_config_dir }}/reality_keys.txt
  args:
    executable: /bin/bash
  when: not xray_reality_key_file.stat.exists or xray_reality_key_file.stat.size == 0

- name: Read REALITY key material
  ansible.builtin.slurp:
    src: "{{ xray_config_dir }}/reality_keys.txt"
  register: xray_reality_keys_raw

- name: Store REALITY keys as facts
  ansible.builtin.set_fact:
    xray_reality_private_key: "{{ ((xray_reality_keys_raw.content | b64decode) | regex_search('PrivateKey:\\s*(\\S+)', '\\1')) | first }}"
    xray_reality_public_key: "{{ ((xray_reality_keys_raw.content | b64decode) | regex_search('Password(?: \\(PublicKey\\))?:\\s*(\\S+)', '\\1')) | first }}"

- name: Generate and store per-client short IDs
  ansible.builtin.copy:
    dest: "{{ xray_config_dir }}/clients/{{ item.name }}.shortid"
    content: "{{ lookup('ansible.builtin.password', '/dev/null chars=hexdigits length=8') | lower }}"
    owner: xray
    group: xray
    mode: "0600"
    force: false
  loop: "{{ xray_clients }}"

- name: Read client short IDs from remote server
  ansible.builtin.slurp:
    src: "{{ xray_config_dir }}/clients/{{ item.name }}.shortid"
  loop: "{{ xray_clients }}"
  register: xray_shortid_results

- name: Build short ID map
  ansible.builtin.set_fact:
    xray_shortid_map: "{{ xray_shortid_map | default({}) | combine({item.item.name: (item.content | b64decode | trim)}) }}"
  loop: "{{ xray_shortid_results.results }}"

- name: Install Xray config
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ xray_config_dir }}/config.json"
    owner: xray
    group: xray
    mode: "0640"
  notify: Restart Xray

- name: Install Xray systemd unit
  ansible.builtin.template:
    src: xray.service.j2
    dest: /etc/systemd/system/xray.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart Xray

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Render client share links
  ansible.builtin.template:
    src: client.txt.j2
    dest: "{{ xray_client_output_dir }}/{{ item.name }}.txt"
    owner: xray
    group: xray
    mode: "0600"
  loop: "{{ xray_clients }}"

- name: Enable and start Xray
  ansible.builtin.systemd:
    name: xray
    enabled: true
    state: started
